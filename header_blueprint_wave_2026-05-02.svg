    <text x="452" y="79" class="ct">R22</text>
    <text x="466" y="79" class="ct">R34</text>
    <text x="435" y="77" class="ct" text-anchor="middle">6×Ø11</text>
    <text x="488" y="46" class="ct">PCD112</text>
    <text x="350" y="72" class="ct">Ø140</text>
  </g>

  <!-- RIGHT: Housing cross-section -->
  <g opacity="0.22" stroke="#a8c8e0" fill="none" stroke-width="0.8">
    <rect x="568" y="14" width="185" height="122"/>
    <rect x="598" y="34" width="125" height="82"/>
    <line x1="530" y1="75" x2="775" y2="75" stroke-dasharray="8,4,2,4" stroke-width="0.6"/>
    <line x1="660" y1="-5" x2="660" y2="160" stroke-dasharray="8,4,2,4" stroke-width="0.6"/>
