    <line x1="598" y1="106" x2="723" y2="106"/>
    <line x1="618" y1="54" x2="703" y2="54"/>
    <line x1="618" y1="96" x2="703" y2="96"/>
    <!-- Bearing seat hatching -->
    <rect x="598" y="34" width="24" height="82" fill="url(#hatch45)" stroke-width="0.5"/>
    <rect x="699" y="34" width="24" height="82" fill="url(#hatch45)" stroke-width="0.5"/>
    <!-- O-ring grooves -->
    <line x1="628" y1="34" x2="628" y2="44"/><line x1="634" y1="34" x2="634" y2="44"/>
    <line x1="686" y1="34" x2="686" y2="44"/><line x1="692" y1="34" x2="692" y2="44"/>
    <!-- Dimension lines -->
    <line x1="568" y1="7" x2="753" y2="7" marker-start="url(#arrL)" marker-end="url(#arr)"/>
    <line x1="568" y1="4" x2="568" y2="10"/><line x1="753" y1="4" x2="753" y2="10"/>
    <line x1="762" y1="14" x2="762" y2="136" marker-start="url(#arrL)" marker-end="url(#arr)"/>
    <line x1="759" y1="14" x2="765" y2="14"/><line x1="759" y1="136" x2="765" y2="136"/>
    <!-- Surface finish + tolerance frame -->
    <path d="M648,13 L651,7 L654,13" stroke-width="0.7"/>
    <line x1="651" y1="7" x2="660" y2="7"/>
    <rect x="660" y="3" width="42" height="9"/>
    <line x1="680" y1="3" x2="680" y2="12"/>
  </g>
  <g opacity="0.22">
    <text x="657" y="6" class="ct" text-anchor="middle">185</text>
    <text x="767" y="78" class="ct">122</text>
    <text x="656" y="80" class="ct" text-anchor="middle">Ø82H7</text>
    <text x="656" y="50" class="ct" text-anchor="middle">Ø94</text>
    <text x="661" y="9" class="ct">⊕0.05 A</text>
    <text x="580" y="148" class="ct">ISO 2768-m</text>
    <text x="668" y="148" class="ct">Ra 1.6</text>
  </g>

  <!-- FAR RIGHT: Title block (partial) -->
  <g opacity="0.16" stroke="#a8c8e0" fill="none" stroke-width="0.5">
    <rect x="808" y="95" width="52" height="58"/>
    <line x1="808" y1="108" x2="860" y2="108"/>
    <line x1="808" y1="120" x2="860" y2="120"/>
    <line x1="808" y1="132" x2="860" y2="132"/>
    <line x1="808" y1="144" x2="860" y2="144"/>
    <line x1="832" y1="95" x2="832" y2="153"/>
  </g>
  <g opacity="0.16">
    <text x="813" y="105" class="ct">Pos.</text><text x="836" y="105" class="ct">Bez.</text>
    <text x="813" y="117" class="ct">1</text><text x="836" y="117" class="ct">Welle</text>
    <text x="813" y="129" class="ct">2</text><text x="836" y="129" class="ct">Flansch</text>
    <text x="813" y="141" class="ct">3</text><text x="836" y="141" class="ct">Gehäuse</text>
    <text x="813" y="152" class="ct">4</text><text x="836" y="152" class="ct">Lager</text>
  </g>

  <!-- Long construction lines across full width -->
  <g opacity="0.12" stroke="#a8c8e0" fill="none" stroke-width="0.5">
    <line x1="-10" y1="25" x2="870" y2="25" stroke-dasharray="3,7"/>
    <line x1="-10" y1="125" x2="870" y2="125" stroke-dasharray="3,7"/>
    <line x1="300" y1="-5" x2="300" y2="160" stroke-dasharray="4,6"/>
    <line x1="560" y1="-5" x2="560" y2="160" stroke-dasharray="4,6"/>
    <!-- Additional arc between sections -->
    <path d="M265,58 Q282,38 300,58 Q282,78 265,58 Z"/>
    <path d="M270,75 Q282,65 295,75"/>
    <path d="M530,55 Q545,38 562,55"/>
    <path d="M530,95 Q545,112 562,95"/>
  </g>

  <!-- ========== WAVES ========== -->
  <g transform="translate(427, 75) scale(1, 1) translate(-427, -75)">
    <path d="" fill="#607996" opacity="0.50">
      <animate attributeName="d" dur="20s" repeatCount="indefinite"
        keyTimes="0;0.333;0.667;1"
        keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"
        calcMode="spline" begin="0s"
        values="M0 0L 0 70Q 213.5 110 427 80T 854 105L 854 0 Z;M0 0L 0 95Q 213.5 110 427 90T 854 80L 854 0 Z;M0 0L 0 115Q 213.5 85 427 115T 854 80L 854 0 Z;M0 0L 0 70Q 213.5 110 427 80T 854 105L 854 0 Z"/>
    </path>
    <path d="" fill="#607996" opacity="0.50">
      <animate attributeName="d" dur="20s" repeatCount="indefinite"
        keyTimes="0;0.333;0.667;1"
        keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"
        calcMode="spline" begin="-10s"
        values="M0 0L 0 85Q 213.5 130 427 100T 854 110L 854 0 Z;M0 0L 0 100Q 213.5 70 427 70T 854 90L 854 0 Z;M0 0L 0 95Q 213.5 75 427 100T 854 115L 854 0 Z;M0 0L 0 85Q 213.5 130 427 100T 854 110L 854 0 Z"/>
    </path>
  </g>

  <!-- ========== NAME ========== -->
  <text text-anchor="middle" alignment-baseline="middle" x="50%" y="38%" class="name" fill="#e8f1f8">Holger Rode</text>

</svg>
