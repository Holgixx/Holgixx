    <circle cx="430" cy="75" r="70"/>
    <circle cx="430" cy="75" r="56" stroke-dasharray="6,3" stroke-width="0.6"/>
    <circle cx="430" cy="75" r="34"/>
    <circle cx="430" cy="75" r="22"/>
