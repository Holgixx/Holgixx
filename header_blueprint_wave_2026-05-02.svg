    <circle cx="430" cy="19" r="5.5"/>
    <circle cx="478" cy="47" r="5.5"/>
    <circle cx="478" cy="103" r="5.5"/>
    <circle cx="430" cy="131" r="5.5"/>
    <circle cx="382" cy="103" r="5.5"/>
    <circle cx="382" cy="47" r="5.5"/>
    <!-- Center crosshairs -->
    <line x1="340" y1="75" x2="520" y2="75" stroke-dasharray="8,4,2,4" stroke-width="0.6"/>
    <line x1="430" y1="-5" x2="430" y2="160" stroke-dasharray="8,4,2,4" stroke-width="0.6"/>
