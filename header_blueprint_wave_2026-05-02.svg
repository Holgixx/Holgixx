    <line x1="430" y1="75" x2="452" y2="75" marker-end="url(#arr)" stroke-width="0.7"/>
    <line x1="430" y1="75" x2="464" y2="75" marker-end="url(#arr)" stroke-width="0.7"/>
    <!-- Hatching on hub annulus -->
    <line x1="412" y1="30" x2="419" y2="23" stroke-width="0.5"/>
    <line x1="419" y1="30" x2="426" y2="23" stroke-width="0.5"/>
    <line x1="426" y1="28" x2="433" y2="21" stroke-width="0.5"/>
    <line x1="440" y1="21" x2="447" y2="28" stroke-width="0.5"/>
    <line x1="447" y1="21" x2="454" y2="28" stroke-width="0.5"/>
    <line x1="410" y1="120" x2="418" y2="128" stroke-width="0.5"/>
    <line x1="418" y1="120" x2="426" y2="128" stroke-width="0.5"/>
    <line x1="440" y1="128" x2="448" y2="120" stroke-width="0.5"/>
    <line x1="448" y1="128" x2="456" y2="120" stroke-width="0.5"/>
