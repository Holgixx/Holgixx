<svg
  width="854"
  height="150"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 854 150"
  style="z-index:1;position:relative"
>
  <defs>
    <pattern id="smallGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#8aafc8" stroke-width="0.3" opacity="0.4"/>
    </pattern>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#smallGrid)"/>
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#8aafc8" stroke-width="0.8" opacity="0.5"/>
    </pattern>
    <pattern id="hatch45" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#a8c8e0" stroke-width="0.6"/>
    </pattern>
    <marker id="arr" markerWidth="4" markerHeight="4" refX="4" refY="2" orient="auto">
      <path d="M0,0 L4,2 L0,4 Z" fill="#a8c8e0"/>
    </marker>
    <marker id="arrL" markerWidth="4" markerHeight="4" refX="0" refY="2" orient="auto">
      <path d="M4,0 L0,2 L4,4 Z" fill="#a8c8e0"/>
    </marker>
  </defs>

  <style>
    .name {
      font-size: 36px; font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif;
      animation: fadeIn 1.4s ease-in-out forwards;
    }
    .ct { font-size: 7px; font-family: 'Courier New', monospace; fill: #a8c8e0; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>

  <!-- Background + Grid -->
  <rect width="854" height="150" fill="#1b2d40"/>
  <rect width="854" height="150" fill="url(#grid)"/>

  <!-- ========== CAD DRAWING ========== -->

  <!-- LEFT: Shaft front view -->
  <g opacity="0.22" stroke="#a8c8e0" fill="none" stroke-width="0.8">
    <rect x="18" y="18" width="225" height="114"/>
    <rect x="18" y="28" width="38" height="94"/>
    <rect x="205" y="28" width="38" height="94"/>
    <line x1="56" y1="48" x2="205" y2="48"/>
    <line x1="56" y1="102" x2="205" y2="102"/>
    <rect x="112" y="48" width="28" height="13"/>
    <rect x="112" y="89" width="28" height="13"/>
    <!-- Center lines -->
    <line x1="-5" y1="75" x2="290" y2="75" stroke-dasharray="8,4,2,4" stroke-width="0.6"/>
    <line x1="130" y1="-5" x2="130" y2="160" stroke-dasharray="8,4,2,4" stroke-width="0.6"/>
    <line x1="37" y1="8" x2="37" y2="148" stroke-dasharray="5,3" stroke-width="0.5"/>
    <line x1="224" y1="8" x2="224" y2="148" stroke-dasharray="5,3" stroke-width="0.5"/>
    <!-- Dimension lines -->
    <line x1="18" y1="10" x2="243" y2="10" marker-start="url(#arrL)" marker-end="url(#arr)"/>
    <line x1="18" y1="7" x2="18" y2="13"/><line x1="243" y1="7" x2="243" y2="13"/>
    <line x1="56" y1="4" x2="205" y2="4" marker-start="url(#arrL)" marker-end="url(#arr)"/>
    <line x1="56" y1="1" x2="56" y2="7"/><line x1="205" y1="1" x2="205" y2="7"/>
    <line x1="252" y1="18" x2="252" y2="132" marker-start="url(#arrL)" marker-end="url(#arr)"/>
    <line x1="249" y1="18" x2="255" y2="18"/><line x1="249" y1="132" x2="255" y2="132"/>
    <!-- Fillets -->
    <path d="M56,48 Q51,48 51,53" stroke-width="0.7"/>
    <path d="M56,102 Q51,102 51,97" stroke-width="0.7"/>
    <!-- Thread lines right flange -->
    <line x1="208" y1="31" x2="240" y2="31"/><line x1="208" y1="34" x2="240" y2="34"/>
    <line x1="208" y1="37" x2="240" y2="37"/><line x1="208" y1="40" x2="240" y2="40"/>
    <line x1="208" y1="116" x2="240" y2="116"/><line x1="208" y1="113" x2="240" y2="113"/>
    <line x1="208" y1="110" x2="240" y2="110"/><line x1="208" y1="107" x2="240" y2="107"/>
    <!-- Surface finish symbol -->
    <path d="M140,15 L143,9 L146,15" stroke-width="0.7"/>
    <line x1="143" y1="9" x2="152" y2="9"/>
    <!-- Gear teeth suggestion far left -->
    <path d="M-5,52 L9,55 L11,49 L9,43 L-5,46 Z" stroke-width="0.5"/>
    <path d="M-5,62 L9,65 L11,59 L9,53 L-5,56 Z" stroke-width="0.5"/>
    <path d="M-5,72 L9,75 L11,69 L9,63 L-5,66 Z" stroke-width="0.5"/>
    <path d="M-5,82 L9,85 L11,79 L9,73 L-5,76 Z" stroke-width="0.5"/>
    <path d="M-5,92 L9,95 L11,89 L9,83 L-5,86 Z" stroke-width="0.5"/>
    <path d="M-5,102 L9,105 L11,99 L9,93 L-5,96 Z" stroke-width="0.5"/>
  </g>
  <g opacity="0.22">
    <text x="130" y="9" class="ct" text-anchor="middle">225</text>
    <text x="130" y="3" class="ct" text-anchor="middle">149</text>
    <text x="257" y="78" class="ct">114</text>
    <text x="46" y="73" class="ct" text-anchor="middle">Ø68</text>
    <text x="128" y="59" class="ct" text-anchor="middle">Ø44</text>
    <text x="220" y="73" class="ct" text-anchor="middle">Ø68</text>
    <text x="126" y="57" class="ct" text-anchor="middle">12×6</text>
    <text x="241" y="26" class="ct">M10</text>
    <text x="22" y="46" class="ct">R3</text>
    <text x="148" y="12" class="ct">Ra1.6</text>
  </g>

